<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系马睿 | 时述智能</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #E85A4F;
            --dark: #0d0d1a;
            --darker: #060610;
            --light: #f8f9fa;
            --gray: #8a8a9a;
            --accent: #4a90d9;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
            line-height: 1.8;
            color: var(--light);
            background: var(--darker);
            min-height: 100vh;
        }
        
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 13, 26, 0.9);
            backdrop-filter: blur(20px);
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
        
        .logo span {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .back-btn {
            color: var(--gray);
            text-decoration: none;
            font-size: 14px;
        }
        
        .main {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 40px 80px;
        }
        
        .contact-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            overflow: hidden;
            margin: 0 auto 24px;
        }
        
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .contact-card h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .contact-card .title {
            color: var(--primary);
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .contact-card .desc {
            color: var(--gray);
            font-size: 15px;
            margin-bottom: 30px;
        }
        
        .qrcode-box {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: inline-block;
            margin-bottom: 16px;
        }
        
        .qrcode-box img {
            width: 180px;
            height: 180px;
            display: block;
        }
        
        .qrcode-tip {
            color: var(--gray);
            font-size: 13px;
        }
        
        .divider {
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 30px 0;
        }
        
        .alt-contact {
            text-align: left;
        }
        
        .alt-contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .alt-contact-item span:first-child {
            color: var(--gray);
            width: 50px;
        }
        
        .alt-contact-item a {
            color: var(--light);
            text-decoration: none;
        }
        
        .alt-contact-item a:hover {
            color: var(--primary);
        }
        
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .main { padding: 100px 20px 60px; }
            .contact-card { padding: 30px 20px; }
            .contact-card h1 { font-size: 22px; }
            .qrcode-box img { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">入镜<span>inshot</span></a>
        <a href="/" class="back-btn">← 返回首页</a>
    </nav>
    
    <div class="main">
        <div class="contact-card">
            <div class="avatar">
                <img src="images/team-1.jpg" alt="马睿">
            </div>
            <h1>马睿</h1>
            <p class="title">时述智能创始人 & CEO</p>
            <p class="desc">扫描二维码，添加微信<br/>直接聊聊合作可能</p>
            
            <div class="qrcode-box">
                <img src="images/wechat-qr.jpg" alt="微信二维码">
            </div>
            <p class="qrcode-tip">微信扫码添加</p>
            
            <div class="divider"></div>
            
            <div class="alt-contact">
                <div class="alt-contact-item">
                    <span>邮箱</span>
                    <a href="mailto:contact@rujing.net">contact@rujing.net</a>
                </div>
                <div class="alt-contact-item">
                    <span>公司</span>
                    <span>时述智能科技有限公司</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
